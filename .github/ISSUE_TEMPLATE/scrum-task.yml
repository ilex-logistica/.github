name: Scrum task
description: Rastrear tarefa de sprint com DoD, critérios e evidências.
title: "[TASK-ID] resumo objetivo"
labels:
  - scrum
body:
  - type: input
    id: task_id
    attributes:
      label: ID da tarefa
      placeholder: LOG-001, C-01, A-08
    validations:
      required: true
  - type: dropdown
    id: sprint
    attributes:
      label: Sprint
      options:
        - Sprint 01 - Fundacao do MVP (2026-05-12 a 2026-05-23)
        - Sprint 02 - Coleta e Monitoramento (2026-05-26 a 2026-06-06)
        - Sprint 03 - Operacao e Eficiencia (2026-06-09 a 2026-06-20)
        - Sprint 04 - Relatorios e Integracoes (2026-06-23 a 2026-07-04)
        - Sprint 05 - Cotacao e Go-Live (2026-07-07 a 2026-07-11)
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: Objetivo
      placeholder: Descreva a entrega esperada.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Critérios de aceite testáveis
      placeholder: Liste critérios verificáveis.
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: Definition of Done
      placeholder: Build, testes, documentação, revisão e evidências.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Evidências de validação
      placeholder: Comandos, prints, logs ou links esperados.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Riscos e rollback
      placeholder: Riscos conhecidos, mitigação e plano de reversão.
    validations:
      required: true
